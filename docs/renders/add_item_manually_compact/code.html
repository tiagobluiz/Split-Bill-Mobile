<div class="mb-10">
<span class="text-primary font-bold tracking-widest text-[11px] uppercase mb-2 block">Manual Entry</span>
<h2 class="text-4xl font-black text-on-surface leading-tight tracking-tight">Add New <br/>Bill Item</h2>

<div class="space-y-8">
<!-- Item Name Input -->
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Item Description</label>
<div class="bg-surface-container-low rounded-2xl p-5 focus-within:bg-surface-container transition-all duration-300">
<input class="w-full bg-transparent border-none p-0 text-lg font-semibold focus:ring-0 placeholder:text-on-surface-variant/30 text-on-surface" placeholder="e.g. Truffle Pasta" type="text"/>
</div>
</div>
<!-- Price Input Group -->
<div class="relative group">
<div class="flex justify-between items-end mb-2 ml-1">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Price</label>
<span class="text-[11px] font-bold text-primary uppercase">Currency: EUR (€)</span>
</div>
<div class="bg-surface-container-low rounded-2xl p-5 focus-within:bg-surface-container transition-all duration-300 flex items-center gap-3">
<span class="text-2xl font-black text-primary/40">€</span>
<input class="w-full bg-transparent border-none p-0 text-3xl font-black focus:ring-0 placeholder:text-on-surface-variant/20 text-on-surface" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
<!-- Contextual Save Button: Placed immediately below interaction point per requirement -->
<button class="mt-6 w-full bg-primary text-on-primary font-['Public_Sans'] font-black uppercase tracking-widest py-5 rounded-xl shadow-[0_12px_32px_rgba(157,68,1,0.15)] hover:bg-primary-container transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-3">
                    Save Item

</button>
</div>

<div class="col-span-4 bg-surface-container-lowest p-6 rounded-2xl shadow-sm">
<label class="block text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant mb-4">Qty</label>
<div class="flex flex-col items-center gap-2">
<button class="text-primary hover:bg-primary/5 p-1 rounded-full"><span class="material-symbols-outlined" data-icon="add">add</span></button>
<span class="text-2xl font-black">1</span>
<button class="text-on-surface-variant/40 p-1 rounded-full"><span class="material-symbols-outlined" data-icon="remove">remove</span></button>
</div>
